name: Release

# Cuts a StageHand release. Triggered by pushing a v* tag (e.g. v1.0.0), or
# manually via workflow_dispatch for a dry run / re-publish. Three jobs:
#
#   image    — multi-arch (amd64+arm64) container image to GHCR, tagged with
#              the full semver plus the rolling 1, 1.0 and latest aliases.
#   binaries — cross-compiled static binaries + a SHA-256 checksums file,
#              kept as build artifacts for the release job to attach.
#   release  — a GitHub Release for the tag with auto-generated notes, with the
#              binaries and checksums attached. Skipped on workflow_dispatch.
#
# The build version is injected into every artifact via -ldflags so `stagehand
# -version` and the image label agree with the tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.3); defaults to the git tag name"
        required: false

permissions:
  contents: write   # create the GitHub Release and upload assets
  packages: write   # push the image to GHCR

env:
  IMAGE: ghcr.io/kingpin/stagehand

jobs:
  # --- Multi-arch container image to GHCR -----------------------------------
  image:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          V="${INPUT_VERSION:-${REF_NAME#v}}"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Container metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Full semver on every push; rolling major/minor + latest only when
          # the tag is a clean release (no -rc/-beta suffix). docker/metadata
          # decides "latest" via the default latest=auto rule.
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=v${{ steps.version.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # --- Cross-compiled binaries + checksums ----------------------------------
  binaries:
    runs-on: ubuntu-latest
    needs: image
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          VERSION: ${{ needs.image.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          name="stagehand"
          [ "$GOOS" = windows ] && name="stagehand.exe"
          out="dist/$name"
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X github.com/KingPin/StageHand/internal/version.Version=${VERSION}" \
            -o "$out" ./cmd/stagehand

          # Package: tar.gz for unix, zip for windows. Bundle the license and a
          # sample config so the archive is usable standalone.
          base="stagehand_${VERSION}_${GOOS}_${GOARCH}"
          cp LICENSE config.example.yaml dist/
          cd dist
          if [ "$GOOS" = windows ]; then
            zip -q "${base}.zip" "$name" LICENSE config.example.yaml
          else
            tar -czf "${base}.tar.gz" "$name" LICENSE config.example.yaml
          fi
          rm -f "$name" LICENSE config.example.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  # --- GitHub Release with notes + assets -----------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [image, binaries]
    # Only when cutting a real tag — manual dispatch builds/publishes but does
    # not create a Release object.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Container image

            ```sh
            docker pull ${{ env.IMAGE }}:${{ needs.image.outputs.version }}
            ```

            Multi-arch (`linux/amd64`, `linux/arm64`). Also tagged `latest`.
            Prebuilt binaries for Linux, macOS and Windows are attached below;
            verify them against `checksums.txt`.
          files: dist/*
